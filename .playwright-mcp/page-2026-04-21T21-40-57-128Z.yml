          - 'heading "[11:22] Modelli GLM 5 di ZAI: quando la quantizzazione aggressiva rompe tutto Permalink " [level=2] [ref=e165]':
            - strong [ref=e166]: "[11:22] Modelli GLM 5 di ZAI: quando la quantizzazione aggressiva rompe tutto"
            - link "Permalink " [ref=e167] [cursor=pointer]:
              - /url: "#1122-modelli-glm-5-di-zai-quando-la-quantizzazione-aggressiva-rompe-tutto"
              - generic [ref=e168]: Permalink
              - generic [ref=e169]: 
          - paragraph [ref=e170]:
            - strong [ref=e171]: Paolo
          - blockquote [ref=e172]:
            - paragraph [ref=e173]: "O anche di GLM 5 se volete. Traduzione in termini pratici di questa lezione di matematica che ci ha fatto Alessio. I modelli GLM sono dei grandi modelli open, alternativi alla famiglia Opus di Anthropic se volete. Funzionano bene, sono là fuori, se avete un computer abbastanza grosso potete cacciarceli dentro e vi danno un buon risultato. I modelli GLM sono di quelli offerti dal servizio di ZhipuAI, che credo siano loro, lo stesso lab dietro cui generano questi modelli. Ed è il servizio economico che io uso, perché aveva dei prezzi assolutamente concorrenziali: pagavamo 250 euro all’anno per servizio unlimited, ed è un buon affare rispetto agli altri prezzi. E allora ho l’abbonamento lì. E qualche tempo fa hanno fatto l’annuncio del rilascio, dopo i modelli 4.7, dei modelli 5. E tutti dicevano “wow, saranno…”, i benchmark mostrano che sono più potenti, migliori e tutto quanto, e tutti sono saltati su quello. Se non che c’è un piccolo problema: smettono di funzionare troppo in fretta. Che cosa significa? Significa che tu li usi e sono ok, nel senso buoni, non sei in grado magari di percepire quel salto, ma ti fidi che siano meglio degli altri. Fino a un certo punto iniziano a tirare fuori parole a caso. E quando dico parole a caso dico proprio parole a caso, come immaginate quando vi si corrompeva la memoria del computer e vedevate i cuoricini qua e là, proprio cose a caso. Tanto che tu dici “boh, deve essere un caso, qualcosa è andata male”. In realtà no. E pare essere, la community specula, che sia una sfortunata scelta di distribuzione che ha fatto ZhipuAI. Per avere un servizio che possa raggiungere tante persone hanno quantizzato aggressivamente questi modelli, e quelli che ci offrono con il servizio sono estremamente quantizzati. Che significa in termini pratici: le persone hanno guardato, quando riempite più o meno la metà del contesto, 200.000, quindi ne riempite 100.000, da lì in poi non c’è garanzia di qualità e di risultato. Ed è un po’ troppo, nel senso che io in termini pratici non riesco ad usare questi modelli. Ho dovuto tornare indietro ai 4.7 che erano più validi. Magari sto usando l’equivalente di un Sonnet, non lo so, ma almeno ho delle risposte consistenti. E uno dei commenti, sempre della community su Reddit, c’è qualcuno che diceva: non è il modello che è cattivo, il modello è effettivamente molto buono. Se voi lo provate da altri provider tipo Alibaba avete una qualità, ce la vedete. È la scelta discutibilissima di ZhipuAI. Tanto che qualcuno si chiedeva se i poveri ricercatori di ZhipuAI che riescono a fare delle cose belle, poi sono estremamente delusi da come la loro società li mette a disposizione del pubblico, dando un’impressione sbagliata della qualità del loro lavoro."
          - paragraph [ref=e174]:
            - strong [ref=e175]: Alessio
          - blockquote [ref=e176]:
            - paragraph [ref=e177]: "A me colpisce questa cosa perché ci sta riportando a ragionare sull’aspetto ingegneristico di tutta questa cosa, sull’aspetto anche sistemistico. L’ho visto facendo delle prove con i modelli locali: non è che io ho questo modello, lo faccio andare bene e lo utilizzo. C’è tutto un discorso di come scelgo il modello, quale quantizzazione prendo, come tiro su il servizio che mi offre l’API per l’inferenza, eccetera. Che è un lavoro diverso da quello del ricercatore che fa il modello, lo traina e lo rilascia. E noi, utilizzando i modelli messi a disposizione tipo ad esempio qui da ZhipuAI, assumiamo semplicemente che tutto funziona e lasciamo loro fare questo lavoro. Però evidentemente c’è chi lo fa meglio, c’è chi lo fa con certe scelte di risorse da allocare, chi ne ha di più, chi ne ha di meno. Un po’ come in generale i servizi in cloud, dipende come li tiri su."
          - paragraph [ref=e178]:
            - strong [ref=e179]: Stefano
          - blockquote [ref=e180]:
            - paragraph [ref=e181]: "Io comunque confermo quell’impressione di Reddit, perché dopo che me l’hai detto mi sono ricordato di avere ancora tipo nove dollari abbandonati su OpenRouter e sono andato a vedere se fornivano GLM. Forniscono il 5, non il 5.1. Ho fatto tre prove di coding e rispetto al servizio di ZhipuAI le risposte sono migliori. A parità di modello hai un’esperienza di coding migliore, anche più veloce tra l’altro. Certo si fa pagare, perché comunque vogliono un euro e rotti ad output. Però siamo sempre lì: se paghi il servizio è perché a loro sta avendo un costo. Se il costo è così basso, o vanno in perdita, che può essere una scelta, qualche azienda l’ha fatto, oppure per tirare clienti, oppure per forza. E tra l’altro la roba che dicevi, che dopo i 100k token, suggerisce che sia la quantizzazione aggressiva della KV cache più che del modello a rompere un po’ tutto. Ci starebbe anche con le parole a caso, perché…"
          - paragraph [ref=e182]:
            - strong [ref=e183]: Alessio
          - blockquote [ref=e184]:
            - paragraph [ref=e185]: C’è un qualche tipo di compromesso.
          - paragraph [ref=e186]:
            - strong [ref=e187]: Stefano
          - blockquote [ref=e188]:
            - paragraph [ref=e189]: …la KV cache fa la parte di attenzione del modello, quindi la scelta della parola successiva è basata sull’attenzione. Se l’attenzione diventa casuale perché hai compresso troppo e non trovi più la parola giusta a cui collegarti, è possibile che escano fuori parole a caso. Secondo me hanno aggressivamente quantizzato la KV cache perché è il punto dove risparmi di più memoria.
          - heading "[17:34] Stesso modello, provider diversi, risultati diversi Permalink " [level=2] [ref=e190]:
            - strong [ref=e191]: "[17:34] Stesso modello, provider diversi, risultati diversi"
