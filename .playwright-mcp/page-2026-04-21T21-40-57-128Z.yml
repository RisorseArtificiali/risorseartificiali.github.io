            - paragraph [ref=e909]: "Non solo ARM. Credo che noi ne supportiamo già adesso più di uno. Lo scoprirò se qualcuno mai si degnerà di installare l’app e provarla. Perché è una delle altre cose che ho scoperto, che si possono fare relativamente facilmente: integrarsi con l’ecosistema di Google, che automaticamente ti lancia i bug report se qualcuno gli crasha l’app. Come nell’esempio di prima di Stefano in cui, tutto contento, ha detto “ok ho finito la mia app, la faccio provare ai miei amici”, non funzionava neanche al lancio. Stessa cosa per la mia app: l’ho data agli amici, neanche al lancio funzionava per degli irragionevoli motivi che io non vedevo. E che invece il tracing trovava. E fare il funnel di queste informazioni dall’applicazione di tracking indietro a Claude Code, dicendogli “guarda che qualcuno ha riportato questo”, lui non batte ciglio. Se uno sviluppatore è stressato da qualcuno che gli riporta un bug trace perché deve capire cos’è, lui fa “a posto, sì sì, è qui e qui il problema, bontà, la rilascio a posto”. L’umano è quasi fuori dal loop adesso, se non per testare la roba."
          - paragraph [ref=e910]:
