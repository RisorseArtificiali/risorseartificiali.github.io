          - blockquote [ref=e912]:
            - paragraph [ref=e913]: Bene, usciamo anche noi dal loop, che siamo oltre l’ora e dieci. Salutiamo tutte e tutti, abbiamo detto meno della metà delle cose che avevamo in scaletta come al solito, ma vabbè, ci saranno altre occasioni. Grazie, campanelline, commenti, domande. Ciao!
