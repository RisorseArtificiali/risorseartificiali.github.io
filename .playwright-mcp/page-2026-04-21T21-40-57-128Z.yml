          - paragraph [ref=e104]:
            - strong [ref=e105]: Alessio
          - blockquote [ref=e106]:
            - paragraph [ref=e107]: "Beh, il discorso è: settimana scorsa parlavamo di Turbo Quant, piccolo riassunto per chi si fosse perso il discorso."
          - paragraph [ref=e108]:
            - strong [ref=e109]: Stefano
          - blockquote [ref=e110]:
            - paragraph [ref=e111]: Questo.
          - paragraph [ref=e112]:
            - strong [ref=e113]: Alessio
          - blockquote [ref=e114]:
            - paragraph [ref=e115]: Google è uscita con un’idea, in realtà è l’implementazione di un paper che già esisteva da un po’, per quantizzare la KV cache al fine di migliorare l’utilizzo di memoria per tenere la KV cache stessa, minimizzando la perdita di qualità. Tutti felici e contenti di questa idea, mezza internet esaltata perché finalmente potremo utilizzare modelli su schede grafiche con poca memoria. Poi però quello che è successo è che la community ha iniziato a implementare davvero questo paper, perché l’implementazione di Google ancora è privata. In particolar modo ci sono in corso le implementazioni in vLLM e in LlamaCPP. E una volta fatte queste prime implementazioni in LlamaCPP la gente ha iniziato a provare e sono arrivati i primi commenti su se funziona o non funziona per davvero. In particolar modo c’è una discussione in corso su LlamaCPP, nel senso che l’implementazione ufficiale non c’è ancora, ci sono delle proposte, c’è una molto attiva discussione con 3 o 4 possibili varianti, gente che si commenta uno con l’altro, che cerca di capire come migliorare il tutto, visto che siamo passati sostanzialmente dal paper all’ingegnerizzazione del software della questione. E poi c’è anche un’implementazione che ha fatto un utente, lo username su GitHub è Tom, specifica per i Mac, per l’architettura dei Mac. Questa versione in realtà è continuamente in evoluzione, ma la versione di qualche giorno fa è stata approvata da diversi utenti. In particolar modo ce n’è uno che ha fatto un video, poi magari vi cerco il riferimento, da cui ho estratto queste due immagini che vi facciamo vedere. E sostanzialmente si spiega, si mostra come, come tante altre cose, sia sostanzialmente un compromesso, un trade-off. Nel senso che fare la quantizzazione, sia quantizzazione classica come era fino a poco tempo fa che questa qui nuova di Turbo Quant, ovviamente ha un costo. E finché la finestra di contesto è relativamente piccola, in realtà la versione non quantizzata funziona meglio, ovviamente più veloce. Poi c’è un momento, un punto del riempimento del contesto, in cui il fatto di avere la compressione della KV cache, quindi meno dati da trattare, porta finalmente a un risparmio anche in termini di tempo e consente quindi di continuare a crescere di contesto senza arrivare allo stallo. E il punto è che questo punto di breakeven è più avanti di quanto si pensava. Nelle prove che faceva questo utente si parla di 100-150 mila token, quindi la gente si aspettava qualcosa di meno. Poi chiaramente queste prove sono specifiche sull’hardware, in questo caso era un Mac della serie M3.
