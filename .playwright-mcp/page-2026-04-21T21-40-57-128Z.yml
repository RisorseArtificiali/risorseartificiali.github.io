          - blockquote [ref=e524]:
            - paragraph [ref=e525]: "Fa niente, fa niente, è un gioco di team e ci sta tutto, oltre al fatto che alcune delle conoscenze arrivavano da queste conversazioni. Allora, in qualche puntata fa, non so quale, stavamo chiacchierando come al solito e a un certo punto del più del meno è saltato fuori dicendo “che fastidio quando la gente ti manda i messaggi vocali”. E ci siamo detti “cavolo, con le capacità del vibe coding adesso non sarà mica così difficile farsi un’app che ti fa la conversione dei messaggi vocali in testo scritto da WhatsApp, ad esempio”. Premessa: se voi avete un iPhone probabilmente questo problema non lo avete perché WhatsApp in Italia ve lo fa tradurre in italiano. Su Android così non è, quindi io che ho un Android mi arrivano i messaggi vocali e li devo ascoltare, non si scappa. E ho detto “magari riesco a fare qualcosa”. E ho iniziato a collegare dei pezzi. Il pezzo che ho collegato è la famosa app Google AI Edge Gallery, che è un’app che Google ha pubblicato su GitHub e poi sullo store, dove se tu la scarichi puoi scaricare i loro modelli Gemma e usarli nella loro app con dei demo, delle feature che loro hanno messo fuori. Poi gli chiedi cose come se fosse un ChatGPT, poi fai la conversione dell’audio, nel senso che gli carichi dei file e lui ti fa la conversione, e via dicendo. E quindi ho detto “sarà fattibile, nel senso Google l’ha provata, quanto sarà difficile farci un’app intorno?”. Mica troppo per un modello. E allora ho deciso che la facevo quest’app per mio uso e consumo personale. Era scomoda per me questa cosa e me la sono creata. Sono affascinato da come sia andata l’attività, perché per me questa è stata un’attività di un sabato mattina in cui senza la famiglia sono riuscito ad andare a fare colazione con calma, non sapevo cosa fare al bar, ho preso in mano il telefono e ho iniziato una conversazione con Gemini e gli ho detto “senti, io vorrei fare questa app che fa sta cosa, secondo te è fattibile?”. E lui mi ha detto “certo che è fattibile, boom, io la farei così”. Mi ha fondamentalmente tirato fuori un PRD. Ho detto ok, lui aveva messo molti più dettagli di quanti io avessi mai immaginato nel mio SMS che gli ho dato per chiedergli l’idea, letteralmente. E va beh, sembra realistica sta roba. Sempre dal telefono ho preso quei dati, li ho dati a Claude Code tramite Telegram, per fare il nerd anche quando sono in giro, e gli ho detto “senti, io vorrei fare sta roba, secondo te è fattibile? Visto che non mi fido di Gemini”. Claude Code mi ha detto “sì è fattibile, ma come la gestisci questa, questa e quell’altra cosa?”. A me lo chiedi, ne so. Vedete? Facciamo una cosa: glielo richiedo a Gemini. Allora glielo ho richiesto a Gemini: “guarda che Claude chiede questo, ha ottime domande, rispondile così”. Quindi ho fatto da passacarte tra i due modelli al bar. Glielo ho ridato a Claude, e Claude fa “a posto grazie, queste sono tutte le informazioni di cui avevo bisogno. Posso fare. Vuoi che lo faccio?”. Fallo!"
