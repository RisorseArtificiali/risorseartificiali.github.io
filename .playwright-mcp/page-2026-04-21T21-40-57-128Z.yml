          - paragraph [ref=e195]:
            - strong [ref=e196]: Paolo
          - blockquote [ref=e197]:
            - paragraph [ref=e198]: "Volevo concludere questo angolo estendendo un pensiero di Alessio che diceva che inizia a contare bene quanto sei bravo a fare il tuo mestiere, quante risorse hai per fornire un servizio che scali e che quindi funzioni. Ma prendendolo da un altro angolo: avevamo dei nostri amici che già si lamentavano di essere persi nel mare di mille modelli, di non sapere quali scegliere. Adesso è diventata peggio: non solo non sai quali scegliere, ma anche lo stesso modello con lo stesso nome, se lo lanci con due configurazioni diverse da una parte e dall’altra, ti dà dei risultati diversi. Buona fortuna a tutti quanti a orientarsi in tutto questo."
          - paragraph [ref=e199]:
