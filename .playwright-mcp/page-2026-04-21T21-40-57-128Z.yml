          - paragraph [ref=e768]:
            - strong [ref=e769]: Paolo
          - blockquote [ref=e770]:
            - paragraph [ref=e771]: "Comunque, se qualcuno si chiede “che ce ne frega del vostro robot?”, domanda lecita. Ma il motivo per cui ve ne può fregare è perché in realtà la robotica moderna va a braccetto con l’AI e la computazione AI all’edge. Cosa significa? Significa che il nostro robottino può comunicare con internet, quindi può, se vede una foto, mandarla sui server, dirgli “cosa ci vedi” e reagire. Ma molte delle realtà pratiche industriali, mondiali, anche di guerra se volete un esempio un po’ estremo, non hanno accesso a internet e quindi deve fare cose in autonomia. Se ne ha sentito parlare appunto sui droni della guerra recentemente, che sono in grado alcuni di ragionare da soli. Il robot ha le stesse esigenze, diciamo: se va sottoterra a cercare di salvare le persone chiuse nella grotta, ci deve andare e a un certo punto dare per scontato di perdere contatto con lui e chiedersi “che cosa fa?”. Quindi deve applicare tutte queste cose di AI che noi stiamo studiando, sia di machine learning tradizionale che di AI basata su AI generativa, su se stesso, e prendere decisioni in autonomia. Quindi una cosa come mandare in giro il robot per casa e vedere se riconosce la pianta viva dalla pianta morta è un’attività tendenzialmente di AI in cui combina la robotica fisica di spostare l’oggetto e l’identificazione dell’informazione."
          - paragraph [ref=e772]:
            - strong [ref=e773]: Stefano
          - blockquote [ref=e774]:
            - paragraph [ref=e775]: "Per fare un esempio meno drammatico dei droni, pensate al nostro rover che ha una telecamera e che deve ad esempio ispezionare come sono state messe le ancore in un porto, che potrebbe essere tranquillamente un’applicazione. E lo lanci a tutta velocità verso il molo della banchina e se perde connessione e non hai sull’edge la capacità di riconoscere quando la banchina è finita, fa un tuffo. E questo non deve succedere. Per cui il gioco lì è decidere quanto tenere sull’edge e quanto invece fare in cloud. Quindi magari i compiti complessi, capire, stando nel mio esempio, che il cavo non è attorcigliato abbastanza bene al molo, puoi farlo in cloud perché se fallisce al massimo ti perdi un’informazione. Il riconoscere l’ambiente circostante per non andare a schiantarti o non andare in mare è una cosa che devi fare sull’edge. Che se vogliamo, tornando al mondo AI, è anche: cosa metto nel modello, che cosa metto nei guardrail, o in applicazioni più complesse, agenti che man mano si svilupperanno, quanta roba tengo in un modello locale che deve fare tutta la parte di guardrail o di accesso a dati privati eccetera, e cose invece delego ad altri agenti. È interessante anche da quel punto di vista, proprio dal punto di vista del design della soluzione intera. E il fatto di avere un oggetto fisico che se si schianta si rompe aiuta di più a stare attenti, diciamo."
