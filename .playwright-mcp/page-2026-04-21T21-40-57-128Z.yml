            - paragraph [ref=e128]: …con 64 GB di memoria e il Qwen 3, 35 billion, quantizzato a 4 bit. Interessante secondo me non tanto per i risultati specifici di questo scenario, quanto per il fatto che si sta pensando, c’è attenzione su questo discorso della quantizzazione delle KV cache, che secondo me è la cosa che ci portiamo a casa da queste due settimane di news. Perché forse prima era un po’ sottovalutata la cosa e si sta cercando di capire come si può agire per riuscire a far andare modelli su hardware tipo le varie schede Nvidia RTX, che sono potenti come velocità ma hanno poca memoria e quindi siamo molto limitati nella lista dei modelli che si possono utilizzare. Dicevi Stefano?
          - paragraph [ref=e129]:
            - strong [ref=e130]: Stefano
          - blockquote [ref=e131]:
            - paragraph [ref=e132]: Allora, io ho due cose che forse non abbiamo detto bene l’altra volta. Per chi è più addetto ai lavori erano chiare, ma forse vale la pena chiarirle, anche se con questa apertura abbiamo rinunciato del tutto a non essere di nicchia.
