          - blockquote [ref=e139]:
            - paragraph [ref=e140]: No no, vabbè, però a parte questo chiariamo due cose al volo. Quantizzazione vuol dire che il modello viene disegnato, i pesi del modello vengono disegnati con una certa profondità, tipicamente 16 bit. Io li comprimo, adesso non stiamo a entrare nei dettagli, se volete andate a vedere il talk che io e Alessio abbiamo fatto al Voxxed Days Zurich dove lo spieghiamo un po’ meglio. Comprimo quella cosa lì per usare meno bit e quindi usare meno memoria. Questa è la quantizzazione dei modelli. La quantizzazione dei modelli la faccio una volta sola e poi pubblico il modello quantizzato e chi lo usa lo carica così. La quantizzazione della KV cache, ed è la cosa che forse non si era chiarita tantissimo l’altra volta per chi non lo sapeva già…
          - paragraph [ref=e141]:
            - strong [ref=e142]: Alessio
          - blockquote [ref=e143]:
            - paragraph [ref=e144]: Sì, l’abbiamo detto, ma forse non abbiamo stressato tanto l’aspetto.
          - paragraph [ref=e145]:
            - strong [ref=e146]: Stefano
          - blockquote [ref=e147]:
            - paragraph [ref=e148]: "…che invece la quantizzo live mentre la sto usando, quindi non è gratis. Il comprimere ha un costo, motivo per cui anche se è più piccola comunque c’è un punto di breakeven, nel senso che non ce l’ho quantizzata a priori perché la KV cache si popola man mano che io metto la roba nel contesto e quindi in quel momento la devo comprimere. L’ultima cosa, che invece è una domanda per te: io trovo anche interessante la curva rossa e la curva verde, che una KV cache quantizzata in maniera tradizionale non è così tanto peggio di questo Turbo Quant."
          - paragraph [ref=e149]:
            - strong [ref=e150]: Alessio
          - blockquote [ref=e151]:
            - paragraph [ref=e152]: "No, infatti il discorso è che sulla velocità più o meno siamo lì, ed è per quello che ti dicevo: la community sta prendendo coscienza di tutto questo aspetto della quantizzazione. Perché poi magari è una mia percezione distorta, non è che semplicemente quantizzo la KV cache e quindi miglioro. Miglioro come occupazione di memoria ma come velocità di esecuzione in realtà peggioro rispetto alla versione non quantizzata. Io quantomeno questa cosa non l’ho sentita sbandierata più di tanto, anche nelle guide che si trovano in giro su come configurare i modelli in locale. Sono vicine sì. Il vero punto è che invece la qualità di quello che si ottiene in teoria con la curva di Turbo è migliore. E lì la differenza, chiaramente questo è un grafico sui token al secondo."
          - paragraph [ref=e153]:
            - strong [ref=e154]: Stefano
          - blockquote [ref=e155]:
            - paragraph [ref=e156]: Migliore. Certo, perché hai ragione, perché il punto di Turbo è che la quantizzazione, la compressione, è con minore perdita di informazione, un po’ come ci sono i JPEG nelle immagini verso altri modi di comprimerle.
          - paragraph [ref=e157]:
            - strong [ref=e158]: Alessio
          - blockquote [ref=e159]:
            - paragraph [ref=e160]: Esatto, “Turbo” è fuorviante perché ti porta a pensare “facciamo una cosa che va più veloce”. In realtà il discorso è legato al fatto che tu stai puntando ad avere una quantizzazione lossless.
          - paragraph [ref=e161]:
            - strong [ref=e162]: Stefano
          - blockquote [ref=e163]:
